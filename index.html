<!doctype html>
<html lang="en">

        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Cache-Control"
            content="no-cache, no-store, must-revalidate"
        />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <link rel="manifest" href="/AI_Hub/manifest.json" />
        <meta name="theme-color" content="#c8401a" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="AI Hub" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <title>frontend</title>
        <script>
            (function (l) {
                if (l.search[1] === "/") {
                    var decoded = l.search
                        .slice(1)
                        .split("&")
                        .map(function (s) {
                            return s.replace(/~and~/g, "&");
                        });
                    window.history.replaceState(
                        null,
                        null,
                        l.pathname.slice(0, -1) +
                            decoded[0] +
                            (decoded[1] ? "?" + decoded[1] : "") +
                            l.hash,
                    );
                }
            })(window.location);
        </script>
      <script type="module" crossorigin src="/AI_Hub/index.CEm29xIF.js"></script>
      <link rel="stylesheet" crossorigin href="/AI_Hub/index.Bx5EpF8v.css">
    </head>
    <body>
        <div id="root"></div>
        <script>
          if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
              navigator.serviceWorker.register('/AI_Hub/sw.js');
            });
          }
        </script>
    </body>
</html>
